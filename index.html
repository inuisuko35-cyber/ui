<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>愛知総合工科高校＠掲示板(仮)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root { color-scheme: light; }
  * , *::before, *::after { box-sizing: border-box; }
  
  /* 画面全体の高さを確保し、下が白くなるのを防ぐ修正 */
  html {
    height: 100%;
    background: #efefef;
  }
  body {
    margin: 0;
    min-height: 100%;
    background: #efefef;
    font-family: 'MS PGothic', 'Osaka-Mono', 'Courier New', monospace;
    color: #000;
    font-size: 13px;
  }

  .bbs-topbar {
    background: #2f6d2f;
    color: #fff;
    padding: 8px 12px;
    font-weight: bold;
    font-size: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px 12px;
  }
  .topbar-admin {
    font-size: 12px;
    font-weight: normal;
  }
  .topbar-admin button {
    background: none;
    border: none;
    color: #d9f2d9;
    text-decoration: underline;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    padding: 0;
  }
  .topbar-admin button:hover { color: #fff; }
  .topbar-admin .sep { color: #9cc99c; margin: 0 4px; }

  .bbs-subbar {
    background: #cae1ca;
    padding: 4px 12px;
    font-size: 12px;
    border-bottom: 1px solid #6b9b6b;
  }
  .bbs-subbar a, .bbs-crumb-link {
    color: #0000ee;
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    font-size: inherit;
    padding: 0;
  }

  .bbs-main {
    max-width: 720px;
    margin: 0 auto;
    padding: 10px 12px 40px;
  }

  .bbs-error {
    background: #ffe0e0;
    border: 1px solid #cc0000;
    color: #900;
    padding: 6px 10px;
    margin-bottom: 10px;
    font-size: 12.5px;
    display: none;
  }
  .bbs-error.show { display: block; }
  .bbs-notice {
    background: #e0f0ff;
    border: 1px solid #4488cc;
    color: #114477;
    padding: 6px 10px;
    margin-bottom: 10px;
    font-size: 12.5px;
    display: none;
  }
  .bbs-notice.show { display: block; }

  .bbs-loading, .bbs-empty {
    text-align: center;
    color: #666;
    padding: 30px 10px;
    font-size: 12.5px;
  }

  /* --- Thread list --- */
  .thread-list {
    background: #fff;
    border: 1px solid #999;
    padding: 2px 0;
    margin-bottom: 12px;
    max-height: 520px;
    overflow-y: auto;
  }

  /* --- 勢いランキング --- */
  .ikioi-box {
    background: #fff8f0;
    border: 1px solid #e0a060;
    margin-bottom: 14px;
    padding: 2px 0 4px;
  }
  .ikioi-header {
    font-size: 12.5px;
    font-weight: bold;
    color: #b8560a;
    padding: 6px 10px 4px;
    border-bottom: 1px solid #f0d0a0;
    margin-bottom: 2px;
  }
  .ikioi-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding: 3px 10px;
    line-height: 1.5;
  }
  .ikioi-rank {
    color: #cc0000;
    font-weight: bold;
    font-size: 12px;
    min-width: 16px;
    text-align: right;
    flex-shrink: 0;
  }
  .ikioi-count {
    color: #b8560a;
    font-size: 11px;
    font-weight: bold;
    flex-shrink: 0;
    white-space: nowrap;
    margin-left: auto;
    padding-left: 6px;
  }
  html.dark-theme .ikioi-box { background: #2a2118; border-color: #7a4a1a; }
  html.dark-theme .ikioi-header { color: #ff9a4d; border-bottom-color: #4a3520; }
  html.dark-theme .ikioi-count { color: #ff9a4d; }

  /* --- 安価（アンカー）通知トースト --- */
  #toastContainer {
    position: fixed;
    right: 14px;
    bottom: 16px;
    z-index: 2000;
    display: flex;
    flex-direction: column-reverse;
    gap: 8px;
    pointer-events: none;
  }
  .anchor-toast {
    pointer-events: auto;
    cursor: pointer;
    background: #fff;
    border-left: 4px solid #2f6d2f;
    border-radius: 4px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.25);
    padding: 8px 12px;
    width: 240px;
    max-width: 70vw;
    font-family: 'MS PGothic', 'Courier New', monospace;
    opacity: 0;
    transform: translateX(24px);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .anchor-toast.show {
    opacity: 1;
    transform: translateX(0);
  }
  .anchor-toast.hide {
    opacity: 0;
    transform: translateX(24px) scale(0.97);
  }
  .anchor-toast-head {
    font-size: 12px;
    font-weight: bold;
    color: #14501e;
    margin-bottom: 3px;
  }
  .anchor-toast-body {
    font-size: 11.5px;
    color: #333;
    line-height: 1.4;
    word-break: break-word;
  }
  html.dark-theme .anchor-toast {
    background: #2a2a2a;
    border-left-color: #4dd865;
    box-shadow: 0 3px 12px rgba(0,0,0,0.5);
  }
  html.dark-theme .anchor-toast-head { color: #4dd865; }
  html.dark-theme .anchor-toast-body { color: #ddd; }

  @media (prefers-reduced-motion: reduce) {
    .anchor-toast { transition: none; }
  }

  /* --- 常時表示の「一覧へ戻る」浮きボタン --- */
  #floatingBackBtn {
    position: fixed;
    left: 14px;
    bottom: 16px;
    z-index: 1900;
    font-family: 'MS PGothic', 'Courier New', monospace;
    font-size: 12.5px;
    font-weight: bold;
    color: #fff;
    background: #2f6d2f;
    border: 1px solid #14501e;
    border-radius: 20px;
    padding: 9px 16px;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    transition: background 0.15s ease, transform 0.1s ease;
  }
  #floatingBackBtn:hover { background: #245524; }
  #floatingBackBtn:active { transform: scale(0.95); }
  html.dark-theme #floatingBackBtn {
    background: #245524;
    border-color: #1a3d1a;
  }

  /* --- 丸い更新ボタン（一覧へ戻るボタンの真上に配置） --- */
  #manualRefreshBtn {
    position: fixed;
    left: 20px;
    bottom: 66px;
    z-index: 1900;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #cc7a00;
    border: 1px solid #8a5200;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    transition: background 0.15s ease, transform 0.1s ease;
  }
  #manualRefreshBtn:hover:not(:disabled) { background: #a86400; }
  #manualRefreshBtn:active:not(:disabled) { transform: scale(0.92); }
  #manualRefreshBtn:disabled { opacity: 0.7; cursor: not-allowed; }
  html.dark-theme #manualRefreshBtn {
    background: #a86400;
    border-color: #6b4000;
  }

  @media (max-width: 460px) {
    #floatingBackBtn {
      left: 10px;
      bottom: 10px;
      padding: 8px 13px;
      font-size: 12px;
    }
    #manualRefreshBtn {
      left: 14px;
      bottom: 58px;
      width: 36px;
      height: 36px;
      font-size: 15px;
    }
  }
  .thread-row {
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding: 4px 8px;
    border-bottom: 1px solid #e5e5e5;
  }
  .thread-row:last-child { border-bottom: none; }
  .thread-row-main {
    display: flex;
    align-items: baseline;
    gap: 4px;
    line-height: 1.5;
  }
  .thread-row-no {
    color: #666;
    min-width: 26px;
    text-align: right;
    flex-shrink: 0;
    font-size: 12px;
  }
  .thread-row-title {
    color: #0000ee;
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 12.5px;
    text-align: left;
    padding: 0;
    word-break: break-all;
    flex: 1 1 auto;
    min-width: 0;
  }
  .thread-row-title:hover { color: #ff0000; }
  .thread-row-count {
    color: #cc0000;
    font-weight: bold;
    font-size: 12px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .thread-row-delta {
    color: #d98600;
    font-weight: bold;
    font-size: 11px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .thread-row-meta {
    color: #999;
    font-size: 11px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .thread-row-meta-left { min-width: 40px; }
  .thread-row-admin-delete {
    font-family: inherit;
    font-size: 11px;
    color: #cc0000;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    flex-shrink: 0;
    margin-left: auto;
    padding-left: 6px;
  }
  .thread-row-preview {
    color: #555;
    font-size: 11.5px;
    padding-left: 30px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .new-thread-toggle {
    display: block;
    width: 100%;
    background: #dde8dd;
    border: 1px solid #6b9b6b;
    color: #14501e;
    font-weight: bold;
    font-family: inherit;
    font-size: 13px;
    padding: 8px;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .new-thread-toggle:hover { background: #cde3cd; }

  .post-form {
    background: #fff;
    border: 1px solid #999;
    padding: 10px;
    margin-bottom: 14px;
  }
  .post-form.hidden { display: none; }
  .post-form-title {
    font-weight: bold;
    color: #14501e;
    border-bottom: 1px solid #ccc;
    padding-bottom: 6px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .post-form-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .post-form-row.align-top { align-items: flex-start; }
  .post-form-row label {
    width: 46px;
    flex-shrink: 0;
    color: #444;
    font-size: 12.5px;
  }
  input[type="text"], input[type="email"], input[type="password"], textarea {
    font-family: inherit;
    font-size: 12.5px;
    border: 1px solid #999;
    padding: 4px 6px;
    width: 100%;
    background: #fff;
  }
  textarea { resize: vertical; }
  .post-form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 8px;
  }
  .btn {
    font-family: inherit;
    font-size: 12.5px;
    background: #e8e8e8;
    border: 1px solid #888;
    padding: 5px 16px;
    cursor: pointer;
  }
  .btn:hover:not(:disabled) { background: #d8d8d8; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary {
    background: #2f6d2f;
    color: #fff;
    border-color: #14501e;
    font-weight: bold;
  }
  .btn-primary:hover:not(:disabled) { background: #245524; }

  input:focus-visible, textarea:focus-visible, button:focus-visible {
    outline: 2px solid #14501e;
    outline-offset: 1px;
  }

  /* --- Thread view --- */
  .thread-title-bar {
    background: #fff;
    border: 1px solid #999;
    padding: 8px 10px;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 10px;
    word-break: break-all;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .thread-nav { margin-bottom: 8px; font-size: 12px; }

  .post-item {
    background: #fff;
    border: 1px solid #ddd;
    border-bottom: 1px dotted #bbb;
    padding: 6px 10px 8px;
    transition: background-color 0.5s;
  }
  .post-item:first-child { border-top: 1px solid #ddd; }
  .post-header { font-size: 12px; color: #333; margin-bottom: 3px; }
  .post-header .no { color: #cc0000; font-weight: bold; }
  .post-header .pname { color: #14501e; font-weight: bold; margin-left: 4px; }
  .post-header .date { color: #555; margin-left: 4px; }
  .post-header .uid { color: #777; margin-left: 4px; font-family: 'Osaka-Mono', 'Courier New', monospace; }
  
  /* 管理者限定：ビカビカ光るアニメーション */
  @keyframes bikabika {
    0%   { color: #ff0000; text-shadow: 0 0 6px #ff0000; }
    20%  { color: #ff8800; text-shadow: 0 0 6px #ff8800; }
    40%  { color: #00ff00; text-shadow: 0 0 6px #00ff00; }
    60%  { color: #00ffff; text-shadow: 0 0 6px #00ffff; }
    80%  { color: #ff00ff; text-shadow: 0 0 6px #ff00ff; }
    100% { color: #ff0000; text-shadow: 0 0 6px #ff0000; }
  }
  .admin-bikabika {
    animation: bikabika 0.4s linear infinite;
    font-weight: 900 !important;
  }

  /* スレ主バッジ */
  .op-badge {
    display: inline-block;
    color: #fff;
    background: #cc5200;
    font-size: 10px;
    font-weight: bold;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 3px;
    margin-left: 4px;
    vertical-align: middle;
  }
  html.dark-theme .op-badge { background: #e06a1e; }

  /* 【機能1】新着レスの自動強調フェード */
  @keyframes wp-highlight {
    0% { background-color: rgba(255, 235, 59, 0.4); }
    100% { background-color: transparent; }
  }
  .post-highlight {
    animation: wp-highlight 4s ease-out;
  }

  /* ▼ 控えめな動的演出 ============ */
  /* フェードインはJS側で明示的に発動させる（CSSで自動発火だと自動更新にも巻き込まれるため） */
  @keyframes viewEnterAnim {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* --- 掲示板下部フッター（オンライン人数＋累計カウンター） --- */
  #bbsFooter {
    margin-top: 20px;
    padding: 12px 8px 20px;
    border-top: 2px double #6b9b6b;
    background: #f0e8d5;
    text-align: center;
    font-size: 11.5px;
    color: #333;
    font-family: 'MS PGothic', 'Courier New', monospace;
  }
  #bbsFooter .footer-inner {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 6px 14px;
    background: #fffcf0;
    border: 1px solid #b8a870;
    border-radius: 2px;
    box-shadow: inset 0 0 0 1px #fff;
  }
  #bbsFooter .footer-item { white-space: nowrap; }
  #bbsFooter .footer-sep { color: #888; }
  #bbsFooter #visitCounterDisplay,
  #bbsFooter #footerOnlineCount,
  #bbsFooter #footerThreadOnline {
    font-weight: bold;
    color: #cc0000;
    font-family: 'Courier New', monospace;
    padding: 0 3px;
    font-variant-numeric: tabular-nums;
  }
  .online-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2ecc40;
    box-shadow: 0 0 6px #2ecc40;
    vertical-align: middle;
    margin-right: 4px;
    animation: onlinePulse 1.8s ease-in-out infinite;
  }
  @keyframes onlinePulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.45; }
  }
  html.dark-theme #bbsFooter {
    background: #1a1a1a;
    border-top-color: #444;
    color: #ccc;
  }
  html.dark-theme #bbsFooter .footer-inner {
    background: #252525;
    border-color: #555;
    box-shadow: inset 0 0 0 1px #333;
  }
  html.dark-theme #bbsFooter #visitCounterDisplay,
  html.dark-theme #bbsFooter #footerOnlineCount,
  html.dark-theme #bbsFooter #footerThreadOnline { color: #ff6b6b; }

  /* スレ一覧の各行にオンライン人数バッジ */
  .thread-row-online {
    font-size: 10.5px;
    color: #2ecc40;
    font-weight: bold;
    flex-shrink: 0;
    white-space: nowrap;
    padding-left: 4px;
  }
  html.dark-theme .thread-row-online { color: #4dd865; }

  /* スレ閲覧画面のタイトル横に出す人数バッジ */
  .thread-online-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11.5px;
    color: #2ecc40;
    font-weight: bold;
    margin-left: 10px;
    vertical-align: middle;
  }
  html.dark-theme .thread-online-badge { color: #4dd865; }

  .thread-row {
    transition: background-color 0.18s ease;
  }
  .thread-row:hover { background-color: rgba(47, 109, 47, 0.06); }
  html.dark-theme .thread-row:hover { background-color: rgba(255, 255, 255, 0.05); }

  .post-item { transition: background-color 0.2s ease; }

  #announcementBar {
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  #announcementBar.hiding {
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
  }

  .btn, .post-vote-btn, .thread-row-title, .bbs-crumb-link {
    transition: color 0.15s ease, background-color 0.15s ease, transform 0.1s ease, border-color 0.15s ease;
  }
  .btn:active:not(:disabled), .post-vote-btn:active:not(:disabled) {
    transform: scale(0.96);
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  #manualRefreshBtn.spinning { pointer-events: none; }
  #manualRefreshBtn.spinning .refresh-icon {
    display: inline-block;
    animation: spin 0.9s linear infinite;
  }

  @media (prefers-reduced-motion: reduce) {
    #announcementBar, .btn, .thread-row, .post-vote-btn,
    #manualRefreshBtn.spinning .refresh-icon { animation: none !important; transition: none !important; }
    #app > * { animation: none !important; }
  }

  /* 【機能3】アンカーポップアップ用スタイル */
  #postPopup {
    display: none;
    position: absolute;
    background: #fff;
    color: #000;
    border: 1px solid #999;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
    padding: 10px;
    max-width: 440px;
    min-width: 260px;
    z-index: 1000;
    font-size: 13px;
    pointer-events: none;
  }

  .post-body {
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.6;
    font-size: 13px;
  }
  .anchor { color: #0000ee; text-decoration: underline; cursor: pointer; }
  .anchor:hover { color: #ff0000; }
  .post-delete, .post-quote-btn, .post-report-btn {
    font-family: inherit;
    font-size: 11px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-left: 6px;
    text-decoration: underline;
  }
  .post-delete { color: #cc0000; }
  .post-quote-btn { color: #666; }
  .post-report-btn { color: #b8860b; }

  .post-vote-row {
    display: flex;
    gap: 14px;
    margin-top: 5px;
  }
  .post-vote-btn {
    font-family: inherit;
    font-size: 12px;
    color: #999;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .post-vote-btn:hover:not(:disabled) { color: #555; }
  .post-vote-btn:disabled { cursor: default; }
  .post-vote-count { font-variant-numeric: tabular-nums; }
  .vote-emoji { display: inline-block; font-size: 13px; }
  .vote-emoji.flash-good { animation: voteFlashGood 0.55s ease; }
  .vote-emoji.flash-bad { animation: voteFlashBad 0.55s ease; }
  @keyframes voteFlashGood {
    0% { filter: none; transform: scale(1); }
    35% { filter: drop-shadow(0 0 5px #2ecc40) brightness(1.5) saturate(2); transform: scale(1.45); }
    100% { filter: none; transform: scale(1); }
  }
  @keyframes voteFlashBad {
    0% { filter: none; transform: scale(1); }
    35% { filter: drop-shadow(0 0 5px #ff4d4d) brightness(1.5) saturate(2); transform: scale(1.45); }
    100% { filter: none; transform: scale(1); }
  }

  .post-image {
    max-width: 100%;
    max-height: 300px;
    height: auto;
    margin-top: 8px;
    border: 1px solid #ccc;
    display: block;
  }

  .reply-form { background: #fff; border: 1px solid #999; padding: 10px; margin-top: 14px; }

  /* --- Admin --- */
  .admin-box {
    background: #fff;
    border: 1px solid #999;
    padding: 14px;
    max-width: 320px;
    margin: 0 auto;
  }
  .admin-box .post-form-title { text-align: center; }
  .report-card {
    background: #fff;
    border: 1px solid #ddd;
    padding: 10px;
    margin-bottom: 10px;
  }
  .report-card .meta { font-size: 11.5px; color: #666; margin-bottom: 4px; }
  .report-card .thread-name { color: #14501e; font-weight: bold; }
  .report-card .reason { color: #b8860b; font-size: 12px; margin-bottom: 6px; }
  .report-card .content-preview {
    background: #f7f7f7;
    border: 1px dashed #ccc;
    padding: 6px 8px;
    font-size: 12.5px;
    white-space: pre-wrap;
    word-break: break-word;

<script>
/* ============================================================
   設定：ここに自分のSupabaseプロジェクトの情報を入れてください。
   ============================================================ */
const SUPABASE_URL = "https://porrirsbfjiawvkgagco.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_46bYXuvQVPiHkmhFZVrL_w_eJQtPoIa";

// ▼▼ トップ画像のURL設定（簡単に変更できます！） ▼▼
// 画像を変えたい時は、新しい画像をGitHubに上げてここのファイル名を書き換えるだけです
const TOP_IMAGE_URL = "./overlay-image.png"; 
// ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

const DEFAULT_NAME = "名無しさん@実習中";
const POLL_MS = 5000;

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// リアルタイムのオンライン人数管理（SupabaseのPresence機能を利用）
// ・ボード全体で今何人閲覧しているか
// ・各スレッドで今何人開いているか
// を全ユーザーで共有して表示する
// ============================================================

// 同じ端末なら、リロードしても・複数タブを開いても「1人」として数えるようにする
// (以前は毎回ランダムなIDを作っていたため、同じ人が何度もアクセスするとその分
//  人数が増えて見えてしまっていた)
const clientId = getPersistentDeviceId();
let boardChannel = null;      // 掲示板全体の在席チャンネル
let threadChannel = null;     // 現在開いているスレの在席チャンネル
let currentThreadChannelId = null;

// スレIDごとのオンライン人数（スレ一覧表示用）
const threadPresenceCounts = {};
let boardOnlineCount = 0;
let currentThreadOnlineCount = 0;

function joinBoardPresence() {
  if (boardChannel) return;
  boardChannel = sb.channel("presence_board", {
    config: { presence: { key: clientId } },
  });

  boardChannel.on("presence", { event: "sync" }, () => {
    const stateMap = boardChannel.presenceState();
    boardOnlineCount = Object.keys(stateMap).length;

    // 各スレッドごとの在席人数も集計
    Object.keys(threadPresenceCounts).forEach((k) => delete threadPresenceCounts[k]);
    Object.values(stateMap).forEach((entries) => {
      entries.forEach((entry) => {
        if (entry && entry.thread_id) {
          threadPresenceCounts[entry.thread_id] = (threadPresenceCounts[entry.thread_id] || 0) + 1;
        }
      });
    });

    updateOnlineDisplay();
    updateThreadListOnlineBadges();
  });

  boardChannel.subscribe(async (status) => {
    if (status === "SUBSCRIBED") {
      await boardChannel.track({ thread_id: state.currentThreadId || null });
    }
  });
}

async function updateBoardPresenceLocation() {
  if (!boardChannel) return;
  try {
    await boardChannel.track({ thread_id: state.currentThreadId || null });
  } catch (e) { /* 無視 */ }
}

function joinThreadPresence(threadId) {
  if (currentThreadChannelId === threadId && threadChannel) return;
  leaveThreadPresence();
  currentThreadChannelId = threadId;
  threadChannel = sb.channel(`presence_thread_${threadId}`, {
    config: { presence: { key: clientId } },
  });
  threadChannel.on("presence", { event: "sync" }, () => {
    const stateMap = threadChannel.presenceState();
    currentThreadOnlineCount = Object.keys(stateMap).length;
    updateOnlineDisplay();
  });
  threadChannel.subscribe(async (status) => {
    if (status === "SUBSCRIBED") {
      await threadChannel.track({});
    }
  });
}

function leaveThreadPresence() {
  if (threadChannel) {
    try { sb.removeChannel(threadChannel); } catch (e) {}
    threadChannel = null;
    currentThreadChannelId = null;
    currentThreadOnlineCount = 0;
  }
}

// タブを閉じる・離れる時に在席情報をきちんと消す
// (これが無いと、閉じ方によっては数秒〜数十秒ゴーストとして残ってしまう)
window.addEventListener("pagehide", () => {
  try {
    if (threadChannel) sb.removeChannel(threadChannel);
    if (boardChannel) sb.removeChannel(boardChannel);
  } catch (e) { /* 無視 */ }
});

function updateOnlineDisplay() {
  const boardEl = document.getElementById("footerOnlineCount");
  if (boardEl) boardEl.textContent = boardOnlineCount || "-";

  const threadWrap = document.getElementById("footerThreadOnlineWrap");
  const threadEl = document.getElementById("footerThreadOnline");
  if (state.view === "thread" && state.currentThreadId) {
    if (threadWrap) threadWrap.style.display = "";
    if (threadEl) threadEl.textContent = currentThreadOnlineCount || "-";
  } else {
    if (threadWrap) threadWrap.style.display = "none";
  }

  // スレ閲覧画面のタイトル横バッジ
  const badgeEl = document.getElementById("threadOnlineBadge");
  if (badgeEl) badgeEl.textContent = `👥 ${currentThreadOnlineCount || 0}人閲覧中`;
}

function updateThreadListOnlineBadges() {
  document.querySelectorAll("[data-thread-online-for]").forEach((el) => {
    const threadId = el.getAttribute("data-thread-online-for");
    const count = threadPresenceCounts[threadId] || 0;
    el.textContent = count > 0 ? `👥${count}` : "";
  });
}

// ============================================================
// 累計入室カウンター（このタブで初回訪問時に1増やす）
// ============================================================

async function initVisitCounter() {
  const displayEl = document.getElementById("visitCounterDisplay");
  const alreadyCounted = sessionStorage.getItem("aisogi_visited");
  try {
    if (!alreadyCounted) {
      const { data, error } = await sb.rpc("increment_visit_counter");
      if (error) throw error;
      sessionStorage.setItem("aisogi_visited", "1");
      if (displayEl) displayEl.textContent = Number(data).toLocaleString();
    } else {
      const { data, error } = await sb.from("visit_counter").select("total").eq("id", 1).single();
      if (error) throw error;
      if (displayEl) displayEl.textContent = Number(data.total).toLocaleString();
    }
  } catch (e) {
    console.error("visit counter error:", e);
    if (displayEl) displayEl.textContent = "-";
  }
}

// ============================================================


// --- 履歴管理（戻る・進むボタン対応） ---
window.addEventListener('popstate', (e) => {
  const s = e.state || { view: "list", threadId: null };
  state.view = s.view || "list";
  state.currentThreadId = s.threadId || null;
  if (state.view === "thread") {
    state.currentThread = null;
    state.posts = [];
    joinThreadPresence(state.currentThreadId);
  } else if (state.view === "list") {
    state.currentThreadId = null;
    leaveThreadPresence();
  }
  updateBoardPresenceLocation();
  state.loading = true;
  render();
  refresh(false); // 戻った先のデータを最新化
});

function pushHistory(view, threadId = null) {

}

// --- 更新ボタン処理 ---
async function handleRefresh() {
  const btn = document.getElementById("manualRefreshBtn");
  if (btn) {
    if (btn.disabled) return; // 連打防止
    btn.disabled = true;
    btn.classList.add("spinning");
  }
  try {
    await refresh(false); // silent=falseにして、失敗した時はちゃんとエラーを表示する
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.classList.remove("spinning");
    }
  }
}

const state = {
  view: "list",
  threads: [],
  ikioiThreads: [],
  currentThreadId: null,
  currentThread: null,
  posts: [],
  reports: [],
  loading: true,
  showNewThreadForm: false,
  session: null,
  justOpenedThread: false,
  announcement: null,
};

const appEl = document.getElementById("app");
const crumbEl = document.getElementById("crumb");
const errorEl = document.getElementById("errorBox");
const noticeEl = document.getElementById("noticeBox");
const topbarAdminEl = document.getElementById("topbarAdmin");
const popupEl = document.getElementById("postPopup");

  noticeEl.classList.remove("show");
}

  noticeEl.classList.add("show");
  errorEl.classList.remove("show");
}

  errorEl.classList.remove("show");
  noticeEl.classList.remove("show");
}

function updateAnnouncementBar() {
  const bar = document.getElementById("announcementBar");
  const textEl = document.getElementById("announcementText");
  if (!bar || !textEl) return;
  if (!state.announcement) {
    bar.style.display = "none";

function getSavedName() {
  return localStorage.getItem("aisogi_name") || "";
}
function saveName(name) {
  localStorage.setItem("aisogi_name", name);
}

function getVotedPosts() {
  try {
    return new Set(JSON.parse(localStorage.getItem("aisogi_voted_posts") || "[]"));
  } catch (e) {
    return new Set();
  }
}
function markVoted(postId) {
  const voted = getVotedPosts();
  voted.add(postId);
  localStorage.setItem("aisogi_voted_posts", JSON.stringify([...voted]));
}
function unmarkVoted(postId) {

function checkCooldown() {
  const lastPostTime = localStorage.getItem("bbs_last_post_time");
  if (lastPostTime && Date.now() - parseInt(lastPostTime) < 5000) {
    return false;
  }
  return true;
}

function showAnchorToast(quotingPost, anchoredNo) {
  const container = document.getElementById("toastContainer");
  if (!container) return;

  const preview = (quotingPost.content || "").replace(/\s+/g, " ").trim();
  const shortPreview = preview.length > 40 ? preview.slice(0, 40) + "…" : preview;

  const toast = document.createElement("div");
  toast.className = "anchor-toast";
  toast.innerHTML = `
    <div class="anchor-toast-head">💬 あなたのレス(&gt;&gt;${anchoredNo})に安価がつきました</div>
    <div class="anchor-toast-body">${escapeHtml(quotingPost.name || DEFAULT_NAME)}：${escapeHtml(shortPreview)}</div>
  `;
  toast.onclick = () => {
    const el = appEl.querySelector(`[data-post-no="${quotingPost.no}"]`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
    dismissAnchorToast(toast);
  };

  container.appendChild(toast);
  // 追加直後にクラスを付けることで、CSSのtransitionでスライドインさせる
  requestAnimationFrame(() => toast.classList.add("show"));

  setTimeout(() => dismissAnchorToast(toast), 6000);
}

function dismissAnchorToast(toast) {
  if (!toast || toast.dataset.dismissing) return;
  toast.dataset.dismissing = "1";
  toast.classList.remove("show");
  toast.classList.add("hide");
  setTimeout(() => toast.remove(), 300);
}

function getPersistentDeviceId() {
  let deviceId = localStorage.getItem('bbs_device_id');
  if (!deviceId) {
    deviceId = Math.random().toString(36).substring(2, 15);
    localStorage.setItem('bbs_device_id', deviceId);
  }
  return deviceId;
}

async function getDailyId() {
  const deviceId = getPersistentDeviceId();
  const d = new Date();
  const dateStr = d.toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo' });
  const raw = deviceId + dateStr;
  
  let hash = 0;
  for (let i = 0; i < raw.length; i++) {
    const char = raw.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }
  return Math.abs(hash).toString(16).padStart(8, '0');
}

const WEEKDAYS = ["日", "月", "火", "水", "木", "金", "土"];
function formatDate(iso) {
  const d = new Date(iso);
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}/${p(d.getMonth() + 1)}/${p(d.getDate())}(${WEEKDAYS[d.getDay()]}) ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
function formatRelative(iso) {
  const diffMs = Date.now() - new Date(iso).getTime();
  const sec = Math.max(0, Math.floor(diffMs / 1000));
  if (sec < 60) return `${sec}秒前`;
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}分前`;
  const hour = Math.floor(min / 60);
  if (hour < 24) return `${hour}時間前`;
  const day = Math.floor(hour / 24);
  return `${day}日前`;
}
const seenReplyCounts = {};
function getDelta(threadId, replyCount) {
  if (!(threadId in seenReplyCounts)) {
    seenReplyCounts[threadId] = replyCount;
    return 0;
  }
  return replyCount - seenReplyCounts[threadId];
}
function escapeHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
function renderContentHtml(text) {
  const escaped = escapeHtml(text);
  return escaped.replace(/&gt;&gt;(\d+)/g, (m, no) => `<span class="anchor" data-anchor="${no}">&gt;&gt;${no}</span>`);
}
function isAdmin() {
  return !!state.session;
}

async function loadThreads() {
  const { data, error } = await sb
    .from("threads")
    .select("*")
    .order("last_reply_at", { ascending: false })
    .limit(20); // 画面には15件しか出さないので、全件取得する必要はない
  if (error) throw error;
  return data || [];
}

async function loadIkioiRanking() {
  const { data, error } = await sb
    .from("thread_ikioi")
    .select("*")
    .gt("recent_count", 0)
    .order("recent_count", { ascending: false })
    .limit(8);
  if (error) throw error;
  return data || [];
}

async function loadPosts(threadId) {
  const { data, error } = await sb
    .from("posts_public")
    .select("*")
    .eq("thread_id", threadId)
    .order("no", { ascending: true });
  if (error) throw error;
  return data || [];
}

async function loadReports() {
  const { data, error } = await sb
    .from("reports")
    .select("id, reason, created_at, posts:post_id ( id, no, name, content, thread_id, threads:thread_id ( id, title ) )")
    .order("created_at", { ascending: false });
  if (error) throw error;
  return data || [];
}

async function refresh(silent) {
  let prevPostCount = 0;
  let isAtBottom = false;
  if (state.view === "thread") {
    prevPostCount = state.posts.length;
    isAtBottom = (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 80;
  }

  try {
    // お知らせ欄は毎回軽く取得しておく（他の人が管理者画面で更新したら反映されるように）
    try {
      const { data: settingsRow } = await sb.from("site_settings").select("announcement").eq("id", 1).single();
      state.announcement = settingsRow ? settingsRow.announcement : null;
    } catch (e) {
      // お知らせ欄の取得失敗は致命的ではないので握りつぶす
    }
    updateAnnouncementBar();

    if (state.view === "list") {
      state.threads = await loadThreads();
      state.ikioiThreads = await loadIkioiRanking();
    } else if (state.view === "thread" && state.currentThreadId) {
      const [{ data: threadRow, error: threadErr }, posts] = await Promise.all([
        sb.from("threads").select("*").eq("id", state.currentThreadId).single(),
        loadPosts(state.currentThreadId),
      ]);
      if (threadErr) throw threadErr;
      state.currentThread = threadRow;

      if (prevPostCount > 0 && posts.length > prevPostCount) {
        const myUid = isAdmin() ? "ADMIN" : await getDailyId();
        for (let i = prevPostCount; i < posts.length; i++) {
          posts[i].isNew = true;
          const newPost = posts[i];
          if (newPost.uid === myUid) continue; // 自分自身の書き込みは通知しない
          const anchorNos = [...newPost.content.matchAll(/>>(\d+)/g)].map((m) => Number(m[1]));
          for (const anchorNo of anchorNos) {
            const targetPost = posts.find((p) => p.no === anchorNo);
            if (targetPost && targetPost.uid && targetPost.uid === myUid) {
              showAnchorToast(newPost, anchorNo);
              break; // 1件の新着レスにつき通知は1回でよい
            }
          }
        }
      }
      state.posts = posts;
    } else if (state.view === "admin-reports") {
      state.reports = await loadReports();
    }
    if (!silent) clearMessages();
  } catch (e) {
    if (!silent) showError("読み込みに失敗しました。設定を確認してください。");
    console.error(e);
  } finally {
    const hasNewPosts = (state.view === "thread" && state.posts.length > prevPostCount && prevPostCount > 0);
    state.loading = false;

    if (silent) {
      // 自動更新は常に「今表示されている部分だけ」を書き換える軽量版を使う。
      // フォームの入力内容・スクロール位置（一覧のスクロールも、ページ全体のスクロールも）を保持するため。
      if (state.view === "thread") {
        updatePostsListInPlace();
        if (!isTypingInForm() && hasNewPosts && isAtBottom) {
          window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
        }
        return;
      }
      if (state.view === "list") {
        updateThreadListInPlace();
        return;
      }
      if (isTypingInForm()) {
        return; // 管理者ログイン・お知らせ編集など、他の画面でフォーム入力中の保護
      }
    }

    render();
    
    if (state.view === "thread") {
      if (state.justOpenedThread) {
        window.scrollTo({ top: document.body.scrollHeight });
        state.justOpenedThread = false; 
      } else if (hasNewPosts && isAtBottom) {
        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      }
    }
  }
}

function isTypingInForm() {
  const active = document.activeElement;
  return !!(
    active &&
    appEl.contains(active) &&
    (active.tagName === "INPUT" || active.tagName === "TEXTAREA")
  );
}

async function uploadImage(fileElementId) {
  const fileInput = document.getElementById(fileElementId);
  const file = fileInput.files[0];
  if (!file) return null;

  const MAX_SIZE = 8 * 1024 * 1024; // 8MB
  if (file.size > MAX_SIZE) {
    throw new Error("画像のサイズが大きすぎます（8MB以下にしてください。スマホのカメラ写真は「写真を圧縮」設定にすると小さくなります）");
  }

  // スマホのカメラ写真は拡張子が無い・変な形式のことがあるためフォールバックする
  const hasExt = file.name && file.name.includes(".");
  const ext = (hasExt ? file.name.split(".").pop() : "jpg").toLowerCase().replace(/[^a-z0-9]/g, "") || "jpg";
  const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 10)}.${ext}`;

  const { error } = await sb.storage
    .from("bbs-images")
    .upload(fileName, file, {
      contentType: file.type || "image/jpeg",
      upsert: false,
    });

  if (error) {
    throw new Error(`画像のアップロードに失敗しました（${error.message}）`);
  }

  const { data } = sb.storage.from("bbs-images").getPublicUrl(fileName);
  return data.publicUrl;
}

async function createThread(title, name, content, imageUrl) {
  const uid = isAdmin() ? "ADMIN" : await getDailyId();
  const deviceKey = getPersistentDeviceId();
  const { data: thread, error: threadErr } = await sb
    .from("threads")
    .insert({ title })
    .select()
    .single();
  if (threadErr) throw threadErr;

  const { error: postErr } = await sb
    .from("posts")
    .insert({ thread_id: thread.id, name: name || DEFAULT_NAME, content, image_url: imageUrl, uid: uid, device_key: deviceKey });
  if (postErr) throw postErr;

  return thread;
}

async function createReply(threadId, name, content, imageUrl) {
  const uid = isAdmin() ? "ADMIN" : await getDailyId(); 
  const deviceKey = getPersistentDeviceId();
  const { error } = await sb
    .from("posts")
    .insert({ thread_id: threadId, name: name || DEFAULT_NAME, content, image_url: imageUrl, uid: uid, device_key: deviceKey });
  if (error) throw error;
}

async function reportPost(postId, reason) {
  const { error } = await sb.from("reports").insert({ post_id: postId, reason: reason || null });
  if (error) throw error;
}

async function voteGood(postId) {
  const { error } = await sb.rpc("increment_good", {
    target_post_id: postId,
    voter_device_key: getPersistentDeviceId(),
  });
  if (error) throw error;
}
async function voteBad(postId) {
  const { error } = await sb.rpc("increment_bad", {
    target_post_id: postId,
    voter_device_key: getPersistentDeviceId(),
  });
  if (error) throw error;
}

function handleVoteClick(postId, type) {
  const post = state.posts.find((p) => p.id === postId);
  if (!post || getVotedPosts().has(postId)) return;

  markVoted(postId);
  if (type === "good") post.good_count = (post.good_count ?? 0) + 1;
  else post.bad_count = (post.bad_count ?? 0) + 1;
  post.justVoted = type;
  render();

  setTimeout(() => {
    post.justVoted = null;
  }, 600);

  const call = type === "good" ? voteGood(postId) : voteBad(postId);
  call.catch((err) => {
    // 失敗した場合は表示とローカルの投票記録を元に戻す
    if (type === "good") post.good_count = Math.max(0, (post.good_count ?? 1) - 1);
    else post.bad_count = Math.max(0, (post.bad_count ?? 1) - 1);
    unmarkVoted(postId);
    showError("投票に失敗しました。もう一度お試しください。");
    console.error(err);
    render();
  });
}

function bindPostEventHandlers(container) {
  container.querySelectorAll("[data-quote]").forEach((btn) => {
    btn.onclick = () => {
      const no = btn.getAttribute("data-quote");
      const textarea = document.getElementById("rpContent");
      if (!textarea) return;
      const sep = textarea.value && !textarea.value.endsWith("\n") ? "\n" : "";
      textarea.value = `${textarea.value}${sep}>>${no}\n`;
      textarea.focus();
    };
  });

  container.querySelectorAll("[data-anchor]").forEach((span) => {
    span.onclick = () => {
      const no = span.getAttribute("data-anchor");
      const target = appEl.querySelector(`[data-post-no="${no}"]`);
      if (target) target.scrollIntoView({ behavior: "smooth", block: "center" });
    };

    span.onmouseenter = (e) => {
      const no = span.getAttribute("data-anchor");
      const targetPost = state.posts.find(p => String(p.no) === no);
      if (targetPost) {
        const bikaClass = (targetPost.uid === "ADMIN") ? " admin-bikabika" : "";
        const isOp = !!targetPost.is_op;
        popupEl.innerHTML = `
          <div class="post-header" style="margin-bottom:5px; border-bottom:1px solid #ccc; padding-bottom:2px;">
            <span class="no">${targetPost.no}</span>
            <span class="pname${bikaClass}">${escapeHtml(targetPost.name)}</span>
            <span class="date">${formatDate(targetPost.created_at)}</span>
            <span class="uid${bikaClass}">ID:${escapeHtml(targetPost.uid || '???')}</span>${isOp ? `<span class="op-badge">主</span>` : ""}
          </div>
          <div class="post-body" style="font-size:12px; line-height:1.4;">${escapeHtml(targetPost.content)}</div>
        `;
        popupEl.style.display = "block";

        const rect = span.getBoundingClientRect();
        popupEl.style.left = `${window.scrollX + rect.left}px`;
        popupEl.style.top = `${window.scrollY + rect.bottom + 4}px`;
      }
    };

    span.onmouseleave = () => {
      popupEl.style.display = "none";
    };
  });

  container.querySelectorAll("[data-admin-del-post]").forEach((btn) => {
    btn.onclick = async () => {
      if (!confirm("このレスを削除しますか？")) return;
      try {
        await adminDeletePost(btn.getAttribute("data-admin-del-post"));
        await refresh(false);
      } catch (err) {
        showError("削除に失敗しました。");
        console.error(err);
      }
    };
  });

  container.querySelectorAll("[data-report]").forEach((btn) => {
    btn.onclick = async () => {
      const reason = window.prompt("通報理由（任意・省略可）を入力してください：", "");
      if (reason === null) return;
      try {
        await reportPost(btn.getAttribute("data-report"), reason.trim());
        showNotice("通報しました。管理者が確認します。");
      } catch (err) {
        showError("通報に失敗しました。");
        console.error(err);
      }
    };
  });

  container.querySelectorAll("[data-vote-good]").forEach((btn) => {
    btn.onclick = () => handleVoteClick(btn.getAttribute("data-vote-good"), "good");
  });

  container.querySelectorAll("[data-vote-bad]").forEach((btn) => {
    btn.onclick = () => handleVoteClick(btn.getAttribute("data-vote-bad"), "bad");
  });
}

    } finally {
      btn.disabled = false;
      btn.textContent = "書き込む";
    }
  };
}

function renderAdminAnnouncementView() {
  appEl.innerHTML = `
    <div class="admin-box" style="max-width:480px;">
      <div class="post-form-title">お知らせ欄の編集</div>
      <p style="font-size:12px; color:#666; margin-top:0;">
        ここに書いた内容が、掲示板の一番上に全員に表示されます。空欄で保存すると非表示になります。
      </p>
      <form id="announcementForm">
        <div class="post-form-row align-top">
          <textarea id="announcementInput" rows="4" maxlength="300" placeholder="例：メンテナンスのお知らせ、ルール変更のお知らせ など"></textarea>
        </div>
        <div class="post-form-actions">
          <button type="button" class="btn" id="announcementClear">非表示にする</button>
          <button type="submit" class="btn btn-primary" id="announcementSave">保存する</button>
        </div>
      </form>
    </div>
  `;
  document.getElementById("announcementInput").value = state.announcement || "";

  document.getElementById("announcementForm").onsubmit = async (e) => {
    e.preventDefault();
    const text = document.getElementById("announcementInput").value.trim();
    await saveAnnouncement(text);
  };
  document.getElementById("announcementClear").onclick = async () => {
    document.getElementById("announcementInput").value = "";
    await saveAnnouncement("");
  };
}

async function saveAnnouncement(text) {
  const saveBtn = document.getElementById("announcementSave");
  if (saveBtn) {
    saveBtn.disabled = true;
    saveBtn.textContent = "保存中…";
  }
  try {
    const { error } = await sb
      .from("site_settings")
      .update({ announcement: text || null, updated_at: new Date().toISOString() })
      .eq("id", 1);
    if (error) throw error;
    state.announcement = text || null;
    // 自分がたった今更新した内容なので、自分の画面では非表示記録をリセットしておく
    localStorage.removeItem("aisogi_announcement_dismissed");
    updateAnnouncementBar();
    showNotice("お知らせを更新しました。");
  } catch (err) {
    showError(err && err.message ? `お知らせの更新に失敗しました：${err.message}` : "お知らせの更新に失敗しました。");
    console.error(err);
  } finally {
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = "保存する";
    }
  }
}

function renderAdminLoginView() {
  appEl.innerHTML = `
    <div class="admin-box">
      <div class="post-form-title">管理者ログイン</div>
      <form id="adminLoginForm">
        <div class="post-form-row" style="align-items:flex-start; flex-direction:column;">
          <label for="alEmail" style="width:auto; margin-bottom:2px;">メールアドレス</label>
          <input type="email" id="alEmail" required />
        </div>
        <div class="post-form-row" style="align-items:flex-start; flex-direction:column; margin-top:8px;">
          <label for="alPassword" style="width:auto; margin-bottom:2px;">パスワード</label>
          <input type="password" id="alPassword" required />
        </div>
        <div class="post-form-actions">
          <button type="submit" class="btn btn-primary" id="alSubmit">ログイン</button>
        </div>
      </form>
    </div>
  `;
  document.getElementById("adminLoginForm").onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById("alEmail").value.trim();
    const password = document.getElementById("alPassword").value;
    const btn = document.getElementById("alSubmit");
    btn.disabled = true;
    btn.textContent = "ログイン中…";
    try {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      showNotice("ログインしました。");
      backToList();
    } catch (err) {
      showError("ログインに失敗しました。メールアドレスとパスワードを確認してください。");
      console.error(err);
      btn.disabled = false;
      btn.textContent = "ログイン";
    }
  };
}

function renderAdminReportsView() {
  if (state.loading) {
    appEl.innerHTML = `<div class="bbs-loading">通報一覧を読み込んでいます…</div>`;
    return;
  }
  if (state.reports.length === 0) {
    appEl.innerHTML = `<div class="bbs-empty">現在、通報はありません。</div>`;
    return;
  }
  const cards = state.reports
    .map((r) => {
      const post = r.posts;
      if (!post) {
        return `
          <div class="report-card">
            <div class="meta">${formatDate(r.created_at)}</div>
            <div class="reason">対象の投稿は既に削除済みです</div>
            <div class="actions">
              <button class="btn" data-dismiss="${r.id}">通報を消す</button>
            </div>
          </div>`;
      }
      const threadTitle = post.threads ? post.threads.title : "(スレッド不明)";
      return `
        <div class="report-card">
          <div class="meta">
            <span class="thread-name">${escapeHtml(threadTitle)}</span>
            ／ ${post.no}番「${escapeHtml(post.name)}」／ 通報日時: ${formatDate(r.created_at)}
          </div>
          ${r.reason ? `<div class="reason">通報理由: ${escapeHtml(r.reason)}</div>` : ""}
          <div class="content-preview">${renderContentHtml(post.content)}</div>
          <div class="actions">
            <button class="btn" data-dismiss="${r.id}">問題なし（通報を消す）</button>
            <button class="btn btn-primary" data-admin-del-post="${post.id}" data-dismiss-after="${r.id}">投稿を削除</button>
          </div>
        </div>`;
    })
    .join("");
  appEl.innerHTML = `<div>${cards}</div>`;

  appEl.querySelectorAll("[data-dismiss]").forEach((btn) => {
    btn.onclick = async () => {
      try {
        await adminDismissReport(btn.getAttribute("data-dismiss"));
        await refresh(false);
      } catch (err) {
        showError("処理に失敗しました。");
        console.error(err);
      }
    };
  });
  appEl.querySelectorAll("[data-admin-del-post]").forEach((btn) => {
    btn.onclick = async () => {
      if (!confirm("この投稿を削除しますか？")) return;
      try {
        await adminDeletePost(btn.getAttribute("data-admin-del-post"));
        const reportId = btn.getAttribute("data-dismiss-after");
        if (reportId) await adminDismissReport(reportId);
        await refresh(false);
      } catch (err) {
        showError("削除に失敗しました。");
        console.error(err);
      }
    };
  });
}

function render() {
  const active = document.activeElement;
  let restore = null;
  if (active && appEl.contains(active) && active.id) {
    restore = {
      id: active.id,
      value: active.value,
      selectionStart: typeof active.selectionStart === "number" ? active.selectionStart : null,
      selectionEnd: typeof active.selectionEnd === "number" ? active.selectionEnd : null,
    };
  }

  // 画面(view)が切り替わった時だけフェードイン。
  // CSSクラス方式だと自動更新のinnerHTML書き換えでも発火してしまうため、
  // 画面遷移時のみ、JSで直接子要素にanimationスタイルを付与する方式にする。
  const viewChanged = state._lastRenderedView !== state.view
    || state._lastRenderedThreadId !== state.currentThreadId;
  state._lastRenderedView = state.view;
  state._lastRenderedThreadId = state.currentThreadId;

  renderTopbarAdmin();
  renderCrumb();
  if (state.view === "list") renderListView();
  else if (state.view === "thread") renderThreadView();
  else if (state.view === "admin-login") renderAdminLoginView();
  else if (state.view === "admin-reports") renderAdminReportsView();
  else if (state.view === "admin-announcement") renderAdminAnnouncementView();

  const floatingBackBtn = document.getElementById("floatingBackBtn");
  if (floatingBackBtn) {
    floatingBackBtn.style.display = (state.view === "thread") ? "block" : "none";
  }

  if (restore) {
    const el = document.getElementById(restore.id);
    if (el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA")) {
      el.value = restore.value;
      el.focus();
      if (restore.selectionStart !== null) {
        try {
          el.setSelectionRange(restore.selectionStart, restore.selectionEnd);
        } catch (e) {
        }
      }
    }
  }

  // 画面遷移時のみ、直接の子要素にフェードインアニメを1度だけ適用する
  if (viewChanged) {
    Array.from(appEl.children).forEach((child) => {
      child.style.animation = "viewEnterAnim 0.28s ease";
      child.addEventListener("animationend", function onEnd() {
        child.style.animation = "";
        child.removeEventListener("animationend", onEnd);
      });
    });
  }
}

sb.auth.onAuthStateChange((_event, session) => {
  state.session = session;
  render();
});


(async () => {
  // 初回ロード時に現在の状態を履歴に登録
  history.replaceState({ view: state.view, threadId: state.currentThreadId }, '', '');

  // 修正：ダークモードのクラスを body から html (documentElement) に付与するように変更
  const themeToggleBtn = document.getElementById("themeToggleBtn");
  if (localStorage.getItem("bbs_theme") === "dark") {
    document.documentElement.classList.add("dark-theme");
    themeToggleBtn.textContent = "☀️";
  }
  themeToggleBtn.onclick = () => {
    document.documentElement.classList.toggle("dark-theme");
    const isDark = document.documentElement.classList.contains("dark-theme");
    localStorage.setItem("bbs_theme", isDark ? "dark" : "light");
    themeToggleBtn.textContent = isDark ? "☀️" : "🌙";
  };

  const announcementCloseBtn = document.getElementById("announcementCloseBtn");
  if (announcementCloseBtn) {
    announcementCloseBtn.onclick = () => {
      localStorage.setItem("aisogi_announcement_dismissed", state.announcement || "");
      const bar = document.getElementById("announcementBar");
      bar.classList.add("hiding");
      setTimeout(() => { bar.style.display = "none"; bar.classList.remove("hiding"); }, 260);
    };
  }

  const floatingBackBtn = document.getElementById("floatingBackBtn");
  if (floatingBackBtn) {
    floatingBackBtn.onclick = () => backToList();
  }

  const { data } = await sb.auth.getSession();
  state.session = data.session;
  render();
  refresh(false);
  setInterval(() => refresh(true), POLL_MS);

  // オンライン人数の共有と、累計訪問カウンター
  joinBoardPresence();
  initVisitCounter();
})();
</script>
